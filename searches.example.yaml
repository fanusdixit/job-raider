# Example searches.yaml — copy to `searches.yaml` and adjust.
#
# RSS: official Python job board feed (stable, public).
# HTML: books.toscrape.com is a demo catalog (not jobs); it illustrates
# `html_selectors` with a predictable page structure. Replace with your own
# listing URLs in production.
#
# Respect each site’s terms of use and robots.txt; see README and docs/configuration.md.
version: 1

defaults:
  request_timeout_seconds: 30
  polite_delay_ms: 1000

searches:
  - id: python_jobs_rss
    name: "Python.org job board (RSS)"
    keywords:
      - python
      - developer
      - engineer
      - remote
    region: Italia
    sources:
      - adapter: rss
        label: "Python.org jobs feed"
        url: "https://www.python.org/jobs/feed/rss/"

  - id: demo_html_catalog
    name: "Demo HTML listings (books.toscrape)"
    keywords:
      - light
      - girl
      - souls
    sources:
      - adapter: html_selectors
        label: "books.toscrape.com (demo)"
        url: "https://books.toscrape.com/"
        item: "article.product_pod"
        title: "h3 a"
        link: "h3 a"
        link_base: "https://books.toscrape.com"
