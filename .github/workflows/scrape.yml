name: Scrape and publish dashboard

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC = 07:00 CET (standard time)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Restore searches.yaml from secret
        env:
          SEARCHES_YAML: ${{ secrets.SEARCHES_YAML }}
        run: |
          if [ -z "${SEARCHES_YAML:-}" ]; then
            echo "SEARCHES_YAML secret is not set"
            exit 1
          fi
          printf "%s\n" "$SEARCHES_YAML" > searches.yaml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Run scraper
        run: PYTHONPATH=. python3 run.py searches.yaml

      - name: Commit and push refreshed outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results.json index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(ci): update scrape results"
          git push origin HEAD:main

      - name: Prepare GitHub Pages artifact
        run: |
          mkdir -p _site
          cp index.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: scrape
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
