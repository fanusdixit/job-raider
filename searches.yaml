      - "tutor"
      - "operatore sociale"
      - "cooperativa"
      - "mentor"
      - "Roma"
      - "Lazio"

  - id: comunicazione
    name: "Comunicazione e uffici stampa"
    sources:
      - label: "Job4Good"
        adapter: rss
        url: "https://www.job4good.it/feed/"
