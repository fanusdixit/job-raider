version: 1

defaults:
  request_timeout_seconds: 30
  polite_delay_ms: 1500

searches:
  - id: pnrr_orientamento
    name: "PNRR — Orientatrice / Esperto esterno"
    sources:
      - label: "Job4Good"
        adapter: rss
        url: "https://www.job4good.it/feed/"
    keywords:
      - "orientamento"
      - "esperto esterno"
      - "tutor"
      - "PNRR"
      - "dispersione scolastica"
      - "mentor"
      - "scuola"
      - "educatore"

  - id: concorsi_pa
    name: "Concorsi PA — Lazio e Campania"
