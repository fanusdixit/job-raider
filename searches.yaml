      - label: "Job4Good"
        adapter: rss
        url: "https://www.job4good.it/feed/"
    keywords:
      - "concorso"
      - "selezione pubblica"
      - "Lazio"
      - "Campania"
      - "Roma"
      - "Napoli"
      - "pubblica amministrazione"

  - id: terzo_settore
    name: "Terzo settore"
    sources:
